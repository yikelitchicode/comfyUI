<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>comfyUI</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">Simple demo project</p>
        <h1>comfyUI</h1>
        <p class="lead">
          A lightweight placeholder site for the comfyUI project. Ready for GitHub,
          and structured so it can be deployed to Vercel as a static site.
        </p>
        <div class="actions">
          <a class="button primary" href="https://github.com" target="_blank" rel="noreferrer">GitHub</a>
          <a class="button" href="https://vercel.com" target="_blank" rel="noreferrer">Vercel</a>
        </div>
      </section>

      <section class="grid">
        <article class="card">
          <h2>What’s inside</h2>
          <ul>
            <li>Minimal landing page</li>
            <li>Static asset structure</li>
            <li>Vercel-ready config</li>
          </ul>
        </article>
        <article class="card">
          <h2>Status</h2>
          <p id="status">Loading…</p>
        </article>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
